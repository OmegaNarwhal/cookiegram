<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Order Confirmation - CookieGram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
  <div class="card shadow-sm border-0">
    <div class="card-body p-5">

      
      <div th:if="${emailSent}" class="alert alert-success text-center">
        Confirmation email sent successfully.
      </div>

      <div th:if="${emailSent == false}" class="alert alert-warning text-center">
        Order was placed, but the confirmation email could not be sent.
      </div>

      <div class="text-center mb-4">
        <h1 class="fw-bold text-success">Order Confirmed</h1>
        <p class="text-muted">Your cookie order has been successfully placed.</p>
      </div>

      <ul class="list-group mb-4">
        <li class="list-group-item">
          <strong>Order ID:</strong> <span th:text="${order.id}"></span>
        </li>
        <li class="list-group-item">
          <strong>Cookie Type:</strong> <span th:text="${order.cookieType.displayName}"></span>
        </li>
        <li class="list-group-item">
          <strong>Message:</strong> <span th:text="${order.customMessage}"></span>
        </li>
        <li class="list-group-item">
          <strong>Quantity:</strong> <span th:text="${order.quantity}"></span>
        </li>
        <li class="list-group-item">
          <strong>Total:</strong> <span th:text="'$' + ${order.totalPrice}"></span>
        </li>
        <li class="list-group-item">
          <strong>Status:</strong> <span th:text="${order.status}"></span>
        </li>
      </ul>

      <div class="d-flex gap-2 justify-content-center">
        <a href="/customer" class="btn btn-warning fw-semibold">Back to Dashboard</a>
        <a href="/customer/orders" class="btn btn-outline-dark">View My Orders</a>
      </div>

    </div>
  </div>
</div>

</body>
</html>
