<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Create Cookie Order - CookieGram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --cg-orange:#f97316; --cg-brown:#4b2e2b; }
    .brand { color: var(--cg-orange); }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand bg-white border-bottom">
  <div class="container py-2">
    <a class="navbar-brand fw-bold" href="/customer">Cookie<span class="brand">Gram</span></a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-dark btn-sm" href="/customer">Dashboard</a>
      <a class="btn btn-outline-dark btn-sm" href="/customer/orders">My Orders</a>
      <form th:action="@{/logout}" method="post" class="m-0">
        <button class="btn btn-warning btn-sm fw-semibold" type="submit">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container my-4">
  <div class="card shadow-sm">
    <div class="card-body p-4">
      <h1 class="fw-bold mb-1" style="color:var(--cg-brown);">Create Your Cookie Order</h1>
      <p class="text-muted">Customize your cookie message and place your order.</p>

      <form th:action="@{/customer/orders/preview}" th:object="${orderForm}" method="post" class="mt-4">
        <div class="mb-3">
          <label class="form-label fw-semibold">Cookie Type</label>
          <select class="form-select" th:field="*{cookieType}">
            <option value="">-- Select a cookie --</option>
            <option th:each="type : ${cookieTypes}"
                    th:value="${type}"
                    th:text="${type.displayName}">
            </option>
          </select>
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('cookieType')}" th:errors="*{cookieType}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Custom Message</label>
          <input type="text" class="form-control" th:field="*{customMessage}" maxlength="40"
                 placeholder="Happy Birthday Sarah!">
          <div class="form-text">Maximum 40 characters.</div>
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('customMessage')}" th:errors="*{customMessage}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Recipient Name</label>
          <input type="text" class="form-control" th:field="*{recipientName}">
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('recipientName')}" th:errors="*{recipientName}"></div>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Delivery Address</label>
          <textarea class="form-control" th:field="*{deliveryAddress}" rows="3"></textarea>
          <div class="text-danger small mt-1" th:if="${#fields.hasErrors('deliveryAddress')}" th:errors="*{deliveryAddress}"></div>
        </div>

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label fw-semibold">Quantity</label>
            <input type="number" class="form-control" th:field="*{quantity}" min="1" max="12">
            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}"></div>
          </div>

          <div class="col-md-6 d-flex align-items-end">
            <div class="form-check mb-2">
              <input class="form-check-input" type="checkbox" th:field="*{sprinkles}">
              <label class="form-check-label">Add sprinkles (+$2 each)</label>
            </div>
          </div>
        </div>

        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn btn-warning fw-semibold">Preview Order</button>
          <a href="/customer" class="btn btn-outline-dark">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

</body>
</html>
