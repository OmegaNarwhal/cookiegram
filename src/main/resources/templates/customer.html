<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Customer - CookieGram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand bg-white border-bottom">
  <div class="container py-2">
    <a class="navbar-brand fw-bold" href="/">CookieGram</a>
    <form th:action="@{/logout}" method="post" class="m-0">
      <button class="btn btn-warning btn-sm fw-semibold" type="submit">Logout</button>
    </form>
  </div>
</nav>

<div class="container my-4">
  <div class="p-4 bg-white border rounded-4 shadow-sm mb-4">
    <h1 class="fw-bold mb-1">Welcome, Customer 👋</h1>
    <p class="text-muted mb-0">Current promotions are loaded dynamically from the server.</p>
  </div>

  <h3 class="fw-bold mb-3">Current Promotions</h3>

  <div class="row g-3">
    <div class="col-md-6 col-lg-4" th:each="promo : ${promotions}">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title fw-bold" th:text="${promo.title()}">Promo title</h5>
          <p class="card-text text-muted" th:text="${promo.description()}">Promo description</p>
          <button class="btn btn-warning fw-semibold" disabled>Claim</button>
        </div>
      </div>
    </div>

    <div class="col-12" th:if="${promotions == null || promotions.isEmpty()}">
      <div class="alert alert-light border">No promotions available right now.</div>
    </div>
  </div>
</div>

</body>
</html>
