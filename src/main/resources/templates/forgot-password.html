<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CookieGram — Forgot password</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body>
  <div class="auth-wrap">
    <section class="brand">
      <div class="badge">🍪 <span>Future Sprint Feature</span></div>
      <h1>Reset password</h1>
      <p>
        Sprint 1 mock page. In later sprints this will email a reset link or OTP,
        with rate-limiting and audit logging.
      </p>
    </section>

    <section class="card">
      <h2>Forgot password (Mock)</h2>
      <p class="sub">Placeholder page for demo + navigation completeness.</p>

      <div class="field">
        <label>Email</label>
        <input placeholder="your@email.com" disabled>
      </div>

      <button class="btn" type="button" disabled>Send reset link</button>

      <div class="footer">
        <a class="link" th:href="@{/login}">Back to login</a>
      </div>
    </section>
  </div>
</body>
</html>
