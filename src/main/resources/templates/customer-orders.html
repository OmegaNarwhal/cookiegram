<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>My Orders - CookieGram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container my-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h1 class="fw-bold mb-1">My Cookie Orders</h1>
      <p class="text-muted mb-0">Track the status of your personalized orders.</p>
    </div>
    <div class="d-flex gap-2">
      <a href="/customer/orders/new" class="btn btn-warning fw-semibold">New Order</a>
      <a href="/customer" class="btn btn-outline-dark">Dashboard</a>
    </div>
  </div>

  <div th:if="${orders == null || orders.isEmpty()}" class="alert alert-light border">
    You have not placed any orders yet.
  </div>

  <div th:if="${orders != null && !orders.isEmpty()}" class="card shadow-sm">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Cookie</th>
              <th>Message</th>
              <th>Quantity</th>
              <th>Total</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="order : ${orders}">
              <td th:text="${order.id}"></td>
              <td th:text="${order.cookieType.displayName}"></td>
              <td th:text="${order.customMessage}"></td>
              <td th:text="${order.quantity}"></td>
              <td th:text="'$' + ${order.totalPrice}"></td>
              <td><span class="badge bg-secondary" th:text="${order.status}"></span></td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
