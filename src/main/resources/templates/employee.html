<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Employee Dashboard - CookieGram</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root{
      --cg-orange:#f97316;
      --cg-brown:#4b2e2b;
    }
    .brand{
      color: var(--cg-orange);
    }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand bg-white border-bottom">
  <div class="container py-2">
    <a class="navbar-brand fw-bold" href="/">Cookie<span class="brand">Gram</span></a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-dark btn-sm" href="/">Home</a>
      <form th:action="@{/logout}" method="post" class="m-0">
        <button class="btn btn-warning btn-sm fw-semibold" type="submit">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container my-4">

  <!-- Header -->
  <div class="p-4 bg-white border rounded-4 shadow-sm mb-4">
    <h1 class="fw-bold mb-1" style="color:var(--cg-brown);">Employee Order Dashboard</h1>
    <p class="text-muted mb-0">Manage incoming cookie orders, filter results, and update order status.</p>
  </div>

  <!-- Filter Card -->
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <h5 class="fw-bold mb-3" style="color:var(--cg-brown);">Filter Orders</h5>

      <form th:action="@{/employee}" method="get" class="row g-3 align-items-end">

        <!-- Status Filter -->
        <div class="col-md-4">
          <label for="status" class="form-label fw-semibold">Status</label>
          <select id="status" name="status" class="form-select">
            <option value="">All Statuses</option>
            <option th:each="status : ${statuses}"
                    th:value="${status}"
                    th:text="${status.displayName}"
                    th:selected="${status == selectedStatus}">
            </option>
          </select>
        </div>

        <!-- Username Filter -->
        <div class="col-md-4">
          <label for="customerUsername" class="form-label fw-semibold">Customer Username</label>
          <input type="text"
                 id="customerUsername"
                 name="customerUsername"
                 class="form-control"
                 placeholder="Enter customer username"
                 th:value="${customerUsername}">
        </div>

        <!-- Buttons -->
        <div class="col-md-4 d-flex gap-2">
          <button type="submit" class="btn btn-warning fw-semibold">Apply Filters</button>
          <a th:href="@{/employee}" class="btn btn-outline-secondary">Clear</a>
        </div>

      </form>
    </div>
  </div>

  <!-- Orders Table -->
  <div class="card shadow-sm">
    <div class="card-body">

      <!-- Empty State -->
      <div th:if="${orders == null || orders.isEmpty()}" class="alert alert-light border mb-0">
        No orders found for the selected filter criteria.
      </div>

      <!-- Table -->
      <div th:if="${orders != null && !orders.isEmpty()}" class="table-responsive">
        <table class="table align-middle">

          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Cookie</th>
              <th>Message</th>
              <th>Quantity</th>
              <th>Total</th>
              <th>Status</th>
              <th>Update</th>
            </tr>
          </thead>

          <tbody>
            <tr th:each="order : ${orders}">

              <td th:text="${order.id}"></td>
              <td th:text="${order.customerUsername}"></td>
              <td th:text="${order.cookieType.displayName}"></td>
              <td th:text="${order.customMessage}"></td>
              <td th:text="${order.quantity}"></td>
              <td th:text="'$' + ${order.totalPrice}"></td>

              <!-- STATUS BADGE -->
              <td>
                <span class="badge bg-secondary"
                      th:text="${order.status.displayName}">
                </span>
              </td>

              <!-- UPDATE STATUS -->
              <td>
                <form th:action="@{'/employee/orders/' + ${order.id} + '/status'}"
                      method="post"
                      class="d-flex gap-2">

                  <select name="status" class="form-select form-select-sm">
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status.displayName}"
                            th:selected="${status == order.status}">
                    </option>
                  </select>

                  <button type="submit"
                          class="btn btn-warning btn-sm fw-semibold">
                    Save
                  </button>

                </form>
              </td>

            </tr>
          </tbody>

        </table>
      </div>

    </div>
  </div>

</div>

</body>
</html>
