<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Employee Dashboard - CookieGram</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root{ --cg-orange:#f97316; --cg-brown:#4b2e2b; }
    .brand{ color: var(--cg-orange); }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand bg-white border-bottom">
  <div class="container py-2">
    <a class="navbar-brand fw-bold" href="/">Cookie<span class="brand">Gram</span></a>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-dark btn-sm" href="/">Home</a>
      <form th:action="@{/logout}" method="post" class="m-0">
        <button class="btn btn-warning btn-sm fw-semibold" type="submit">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container my-4">
  <div class="p-4 bg-white border rounded-4 shadow-sm mb-4">
    <h1 class="fw-bold mb-1" style="color:var(--cg-brown);">Employee Order Dashboard</h1>
    <p class="text-muted mb-0">Manage incoming cookie orders and update their status.</p>
  </div>

  <div class="card shadow-sm">
    <div class="card-body">
      <div th:if="${orders == null || orders.isEmpty()}" class="alert alert-light border mb-0">
        No orders have been placed yet.
      </div>

      <div th:if="${orders != null && !orders.isEmpty()}" class="table-responsive">
        <table class="table align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Customer</th>
              <th>Cookie</th>
              <th>Message</th>
              <th>Quantity</th>
              <th>Total</th>
              <th>Status</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody>
            <tr th:each="order : ${orders}">
              <td th:text="${order.id}"></td>
              <td th:text="${order.customerUsername}"></td>
              <td th:text="${order.cookieType.displayName}"></td>
              <td th:text="${order.customMessage}"></td>
              <td th:text="${order.quantity}"></td>
              <td th:text="'$' + ${order.totalPrice}"></td>
              <td><span class="badge bg-secondary" th:text="${order.status}"></span></td>
              <td>
                <form th:action="@{'/employee/orders/' + ${order.id} + '/status'}" method="post" class="d-flex gap-2">
                  <select name="status" class="form-select form-select-sm">
                    <option th:each="status : ${statuses}"
                            th:value="${status}"
                            th:text="${status}"
                            th:selected="${status == order.status}">
                    </option>
                  </select>
                  <button type="submit" class="btn btn-warning btn-sm fw-semibold">Save</button>
                </form>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
