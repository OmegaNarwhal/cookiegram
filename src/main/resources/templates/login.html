<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CookieGram — Log in</title>
  <link rel="stylesheet" th:href="@{/css/auth.css}">
  <style>
    .error { color: #b91c1c; font-size: 0.9rem; margin-bottom: 1rem; }
    .success { color: #166534; font-size: 0.95rem; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }
    .field input { width: 100%; padding: 0.75rem; }
    .btn { width: 100%; padding: 0.9rem; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <section class="brand">
      <div class="badge">🍪 <span>Welcome back to CookieGram</span></div>
      <h1>Log in</h1>
      <p>Sign in with your email to place and manage cookiegram orders.</p>
    </section>

    <section class="card">
      <h2>Account access</h2>
      <p class="sub">Enter your email and password.</p>

      <div th:if="${param.registered}" class="success">
        Account created successfully. Please log in.
      </div>

      <div th:if="${param.error}" class="error">
        Invalid email or password.
      </div>

      <div th:if="${param.logout}" class="success">
        You have been logged out.
      </div>

      <form th:action="@{/login}" method="post">
        <div class="field">
          <label for="username">Email</label>
          <input type="email" id="username" name="username" placeholder="you@example.com" required>
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <button class="btn" type="submit">Log in</button>
      </form>

      <div class="footer" style="margin-top: 1rem;">
        <a class="link" th:href="@{/register}">Create account</a>
        <span> · </span>
        <a class="link" th:href="@{/forgot-password}">Forgot password?</a>
      </div>
    </section>
  </div>
</body>
</html>
