spring.application.name=cookiegram
server.port=8080

# PostgreSQL database for Docker Compose
spring.datasource.url=jdbc:postgresql://db:5432/cookiegram
spring.datasource.username=cookiegram_user
spring.datasource.password=cookiegram_pass
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false

# Mailtrap
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=f516c3b3389f71
spring.mail.password=4e82e8e48852d0
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true